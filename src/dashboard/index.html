<!DOCTYPE html>
<!--
  @rw3iss/tracker — Event Dashboard
  ─────────────────────────────────────────────────────────────────────────────
  Endpoint config: append ?endpoint=http://localhost:3000 to the URL.
    Falls back to window.location.origin when the query param is absent.

  Route prefix override: ?prefix=/api (default '/api').

  Keyboard shortcuts:
    R         — reload / re-fetch events
    F         — focus the appId filter
    S         — toggle the Summary panel
    Escape    — close the detail panel

  Layout: shell → header → stats bar → filter toolbar → summary (toggle) → table.
  Modules under js/ split state, API, filter UI, columns, table, detail, and
  summary into single-purpose pieces. CSS lives in css/dashboard.css.
  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
        Belt-and-braces no-index: TrackerRobotsController serves a
        blanket Disallow at /robots.txt, but a `<meta name="robots">`
        also covers the case where a crawler reaches the page directly
        and ignores robots.txt (some link-scraping bots do).
    -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>Tracker Dashboard</title>
    <!--
        Server-injected runtime config. The {{API_PREFIX}} placeholder
        is replaced by TrackerDashboardController with the consumer's
        actual configured route prefix (`/api`, `/tracker`, or `''`).
        Letting the server be the source of truth means the dashboard
        works correctly regardless of how the deployment is configured,
        without depending on the operator passing `?prefix=` in the URL.
    -->
    <script>
        window.__TRACKER_DASHBOARD_CONFIG__ = {
            apiPrefix:  '{{API_PREFIX}}',
            // Auto-update behaviour — see auto-update.js for the modes:
            //   'false' = skip the version check entirely
            //   'auto'  = wipe stale storage silently, no modal
            //   'modal' = wipe + show the changelog modal (default)
            updateMode: '{{UPDATE_MODE}}'
        };
    </script>
    <!--
        Build-time version stamp. Generated by
        bin/generate-dashboard-version.mjs and overwrites the placeholder
        from src/dashboard/js/version.js. Loaded synchronously (no
        type=module / no defer) so the value is available before any
        other dashboard code executes — auto-update.js reads it on boot.
    -->
    <script src="{{BASE}}/js/version.js"></script>
    <link rel="stylesheet" href="{{BASE}}/css/dashboard.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <!--
        Apply the saved theme BEFORE the stylesheet paints. Otherwise the
        page renders in the default (light) palette for a frame, then snaps
        to dark — visible flash. Synchronous so first paint already has
        the right `data-theme` attribute on <html>. Falls back to the
        OS preference for first-time visitors.
    -->
    <script>
        (function () {
            var stored = null;
            try { stored = JSON.parse(localStorage.getItem('tracker:ui:theme')); } catch (e) {}
            var theme = stored;
            if (theme !== 'dark' && theme !== 'light') {
                theme = window.matchMedia
                    && window.matchMedia('(prefers-color-scheme: dark)').matches
                    ? 'dark' : 'light';
            }
            document.documentElement.dataset.theme = theme;
        })();
    </script>
</head>
<body>

<div class="tk-shell">

    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <header class="tk-header">
        <span class="tk-header__title">tracker</span>
        <span class="tk-header__sub">dashboard</span>

        <div class="tk-header__right">
            <!--
              Manual entry point for the same modal that fires on a
              version mismatch. Lets the operator review the current
              build's changelog without redeploying.
            -->
            <button id="btn-changelog" class="tk-btn" type="button" title="Show current build changelog">Changes</button>
            <label class="tk-sr-only" for="endpoint-input">Endpoint</label>
            <span class="tk-header__label">Endpoint:</span>
            <input id="endpoint-input" class="tk-header__input" type="text"
                placeholder="http://localhost:3000" />
            <button id="btn-connect" class="tk-btn tk-btn--primary">Connect</button>
            <span id="sse-status" class="tk-status ok">● connected</span>
            <button id="btn-theme-toggle" class="tk-theme-toggle" title="Toggle light / dark theme" aria-label="Toggle theme" aria-pressed="false">
                <!-- Sun icon — visible in dark mode (clicking goes to light). -->
                <svg class="tk-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
                <!-- Moon icon — visible in light mode (clicking goes to dark). -->
                <svg class="tk-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ── Stats bar ───────────────────────────────────────────────────── -->
    <div class="tk-stats">
        <span class="tk-stats__item">Total: <strong id="stat-total">0</strong></span>
        <span class="tk-stats__item tk-stats__item--err">Errors: <strong id="stat-errors">0</strong></span>
        <span class="tk-stats__item tk-stats__item--warn">Warnings: <strong id="stat-warnings">0</strong></span>

        <div class="tk-stats__right">
            <label class="tk-checkbox" title="Re-run the query on every filter change — no Apply click needed.">
                <input id="chk-live-filter" type="checkbox" />
                Live filter
            </label>
            <button id="btn-toggle-summary" class="tk-btn tk-btn--toggle" aria-pressed="false">
                Summary
            </button>
            <button id="btn-clear" class="tk-btn tk-btn--danger">Clear display</button>
        </div>
    </div>

    <!--
      Summary panel host. Empty + `hidden` until the user clicks the
      Summary toggle — the inner content (group/view buttons, charts,
      empty-state) is rendered into this section by summary/index.js's
      openPanel() and torn down by closePanel(). Keeping it out of the
      DOM when off ensures (a) no padding / border leak when closed,
      and (b) `render()` never fires for a hidden panel.
    -->
    <section id="summary-panel" class="tk-summary" hidden aria-hidden="true"></section>

    <!-- ── Filter toolbar ──────────────────────────────────────────────── -->
    <div class="tk-toolbar">
        <!--
          Picker fields (Apps / Categories / Types — and any future ones)
          are rendered by js/pickers.js into this host on mount. The
          host uses `display: contents` so the rendered fields participate
          in the toolbar's flex layout directly. Add a new picker by
          adding an entry to PICKER_DEFINITIONS — no HTML edit needed.
        -->
        <div id="picker-toolbar" class="tk-toolbar__pickers"></div>
        <div class="tk-field">
            <label for="f-status">Status</label>
            <select id="f-status">
                <option value="">all</option>
                <option value="new">new</option>
                <option value="viewed">viewed</option>
                <option value="acknowledged">acknowledged</option>
                <option value="in_progress">in_progress</option>
                <option value="resolved">resolved</option>
                <option value="wont_fix">wont_fix</option>
                <option value="archived">archived</option>
            </select>
        </div>
        <div class="tk-field">
            <label for="f-from">From</label>
            <input id="f-from" type="datetime-local" />
        </div>
        <div class="tk-field">
            <label for="f-to">To</label>
            <input id="f-to" type="datetime-local" />
        </div>

        <div class="tk-field">
            <label>&nbsp;</label>
            <button id="btn-payload-toggle" class="tk-btn">
                Payload <span id="payload-count" class="text-dim"></span>
            </button>
            <div id="payload-panel" class="tk-popover" hidden>
                <div id="payload-entries"></div>
                <button id="btn-payload-add" class="tk-popover__add">+ Add filter</button>
            </div>
        </div>

        <div class="tk-field">
            <label>&nbsp;</label>
            <button id="btn-cols-toggle" class="tk-btn">Columns ▾</button>
            <div id="cols-panel" class="tk-popover" hidden></div>
        </div>

        <!--
          Free-text search on event.message. Live mode: 'input' fires
          'filters:changed', which main.js debounces to one fetch per
          ~250ms. Static mode: only Apply triggers a fetch. URL-synced
          via the `q` param (see url-sync.js).
        -->
        <div class="tk-field">
            <label for="f-search">Search</label>
            <input id="f-search" type="search"
                   placeholder="message contains…"
                   autocomplete="off"
                   spellcheck="false" />
        </div>

        <div class="tk-spacer"></div>

        <button id="btn-apply"        class="tk-btn tk-btn--primary">Apply</button>
        <button id="btn-clear-filters" class="tk-btn">Clear</button>
    </div>

    <!-- ── Events table ────────────────────────────────────────────────── -->
    <div class="tk-table-wrap">
        <table class="tk-table">
            <thead><tr id="header-row"></tr></thead>
            <tbody id="event-tbody"></tbody>
        </table>
        <div id="empty-msg" class="tk-empty">No events yet. Waiting for data…</div>
    </div>

    <!-- ── Detail panel ────────────────────────────────────────────────── -->
    <div id="event-detail" class="tk-detail" hidden>
        <div id="detail-header" class="tk-detail__header">
            <span class="tk-detail__title">Event Detail</span>
            <!--
              Whole-event copy. Sits next to the title so it's the first
              thing the eye lands on. Icon button with a checkmark-flash
              on success — same style as the per-field copy buttons in
              Pretty mode, kept consistent across the panel.
            -->
            <button id="btn-copy-detail" class="tk-pretty__copy tk-detail__copy" type="button" title="Copy event JSON" aria-label="Copy event JSON">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <!--
              Copy the absolute API URL for this event — `${origin}${apiPrefix}/events/${id}`.
              Useful for pasting into curl, Postman, or a teammate's chat.
              Uses the server-injected window.__TRACKER_DASHBOARD_CONFIG__.apiPrefix
              so it stays correct under any ROUTE_PREFIX deployment.
            -->
            <button id="btn-copy-api-link" class="tk-pretty__copy tk-detail__copy" type="button" title="Copy API link for this event" aria-label="Copy API link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
            </button>
            <button id="btn-toggle-pretty" class="tk-btn tk-btn--toggle" aria-pressed="false" title="Toggle pretty / raw JSON view">Pretty</button>
            <div class="tk-detail__actions">
                <span class="tk-detail__hint">Update status:</span>
                <select id="detail-status-sel" class="tk-btn">
                    <option value="new">new</option>
                    <option value="viewed">viewed</option>
                    <option value="acknowledged">acknowledged</option>
                    <option value="in_progress">in_progress</option>
                    <option value="resolved">resolved</option>
                    <option value="wont_fix">wont_fix</option>
                    <option value="archived">archived</option>
                </select>
                <button id="btn-update-status" class="tk-btn tk-btn--primary">Update</button>
                <button id="btn-close-detail"  class="tk-detail__close" aria-label="Close">&times;</button>
            </div>
        </div>
        <!--
          Raw + pretty render targets sit side-by-side; only one is
          visible at a time. detail.js flips them via the `hidden`
          attribute when the Pretty toggle is clicked.
        -->
        <pre  id="detail-json"   class="tk-detail__pre"></pre>
        <div  id="detail-pretty" class="tk-detail__pretty" hidden></div>
    </div>

</div>

<script type="module" src="{{BASE}}/js/main.js"></script>
</body>
</html>
