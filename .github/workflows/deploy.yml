name: Deploy Tracker Server

# Push to main → ssh to the production box (InterServer, 162.35.181.92) and
# refresh the checkout at /var/www/tracker: git pull → npm build → restart the
# systemd unit. Runtime config lives on the server in /etc/tracker/tracker.env
# (read by the unit's EnvironmentFile=), so no secrets are written here.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — production IP / hostname (162.35.181.92)
#   DEPLOY_SSH_KEY  — private key whose pubkey is in rw3iss@server:~/.ssh/authorized_keys
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-tracker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: rw3iss
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/tracker
            git fetch origin main -q
            git reset --hard origin/main
            npm ci || npm install
            npm run build
            sudo systemctl restart tracker
            sleep 4
            systemctl is-active tracker
            echo "Deployed $(git rev-parse --short HEAD)"
